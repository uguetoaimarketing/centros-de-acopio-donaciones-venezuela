<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donation Drop-off Centers · Venezuela Needs Us</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling/dist/leaflet-gesture-handling.min.css"/>
<style>
  :root{ --navy:#11214a; --red:#cf1b2b; --yellow:#f4c40b; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:#1c2333; background:#fff; }
  .wrap{ max-width:1100px; margin:0 auto; padding:0 0 16px; }
  .flag{ height:8px; display:flex; }
  .flag i{ flex:1; } .flag .y{ background:var(--yellow); } .flag .b{ background:var(--navy); } .flag .r{ background:var(--red); }
  .head{ display:flex; align-items:center; gap:12px; padding:16px 16px 0; }
  .head .dot{ width:48px;height:48px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#fff; }
  .head h1{ font-size:21px;margin:0;color:var(--navy);font-weight:800;letter-spacing:-.3px; }
  .head p{ font-size:14px;margin:3px 0 0;color:#5b6273; }
  .toggle{ margin-left:auto;align-self:flex-start;background:#fff;border:1.5px solid var(--navy);color:var(--navy);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap; }
  .toggle:hover{ background:var(--navy);color:#fff; }
  .controls{ display:flex;gap:8px;flex-wrap:wrap;margin:14px 16px;align-items:center; }
  .controls input,.controls select{ height:42px;border:1.5px solid #d6d9e0;border-radius:10px;padding:0 12px;font-size:15px;background:#fff; }
  .controls input:focus,.controls select:focus{ outline:none;border-color:var(--navy); }
  .controls input{ flex:1;min-width:200px; }
  .grid{ display:grid; grid-template-columns:1fr; gap:16px; padding:0 16px; }
  @media(min-width:820px){ .grid{ grid-template-columns:1fr 1fr; } }
  #map{ height:300px;border-radius:14px;border:2px solid var(--navy);z-index:0; }
  .list{ display:flex;flex-direction:column;gap:10px;padding-right:4px; }
  @media(min-width:820px){ #map{ height:440px; } .list{ max-height:440px;overflow:auto; } }
  .card{ border:1px solid #e4e6ec;border-left:5px solid var(--yellow);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;transition:all .15s;cursor:pointer; }
  .card:hover{ border-color:var(--navy);border-left-color:var(--red);background:#f7f9fc; }
  .card .info{ flex:1;min-width:150px; }
  .card .name{ font-weight:700;font-size:15px;color:var(--navy);margin:0; }
  .card .addr{ font-size:13px;color:#5b6273;margin:3px 0 0; }
  .card .hours{ font-size:11.5px;color:#8a90a0;margin:4px 0 0; }
  .btn{ white-space:nowrap;display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none; }
  .btn:hover{ background:#a8141f; }
  .pop b{ color:var(--navy);font-size:14px; }
  .pop a{ display:inline-block;margin-top:8px;background:var(--red);color:#fff;padding:7px 12px;border-radius:8px;text-decoration:none;font-weight:700;font-size:13px; }
  .empty{ text-align:center;color:#5b6273;padding:20px;font-size:14px; }
  .donate{ padding:0 16px;margin-top:22px; }
  .donate h2{ font-size:18px;color:var(--navy);margin:0 0 4px;font-weight:800; }
  .dsub{ font-size:13.5px;color:#5b6273;margin:0 0 12px; }
  .priority{ background:#fff0f0;border:2px solid var(--red);border-radius:12px;padding:12px 14px;margin-bottom:16px; }
  .priority h3{ margin:0 0 8px;color:var(--red);font-size:15px;font-weight:800; }
  .priority ul{ margin:0;padding-left:18px;columns:2;column-gap:18px; }
  @media(max-width:560px){ .priority ul{ columns:1; } }
  .priority li{ font-size:13px;color:#3a4256;padding:3px 0;line-height:1.4;break-inside:avoid; }
  .note{ background:#fff7e6;border:1.5px solid var(--yellow);border-radius:12px;padding:12px 14px;font-size:13.5px;color:#5b4a00;margin-bottom:16px;line-height:1.5; }
  .alert{ background:#fdecec;border:2px solid var(--red);border-radius:12px;margin:14px 16px 0;padding:12px 14px;font-size:14px;font-weight:700;color:var(--red);line-height:1.45; }
  .money{ background:var(--navy);color:#fff;border-radius:12px;margin:14px 16px 0;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between; }
  .money .mtxt{ font-size:14px;font-weight:600;line-height:1.45;flex:1;min-width:200px; }
  .money a{ background:var(--yellow);color:var(--navy);font-weight:800;text-decoration:none;padding:10px 16px;border-radius:9px;font-size:14px;white-space:nowrap; }
  .flow{ background:#eaf0fb;border:1.5px solid var(--navy);border-radius:12px;padding:12px 14px;margin:14px 16px 0;font-size:13.5px;color:var(--navy);line-height:1.5; }
  .flow a{ color:var(--red);font-weight:700;text-decoration:none; }
  .flow .chain{ font-weight:800;display:block;margin-top:6px; }
  .flow .onlynote{ display:block;margin-top:8px;font-weight:700;font-size:12.5px;color:var(--red); }
  .card.wh{ border-left-color:var(--navy);background:#f4f7fd; }
  .card.wh .name{ display:flex;align-items:center;gap:6px;flex-wrap:wrap; }
  .badge{ display:inline-block;background:var(--navy);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px; }
  .dcols{ display:grid;grid-template-columns:1fr;gap:14px; }
  @media(min-width:760px){ .dcols{ grid-template-columns:repeat(3,1fr); } }
  .dcard{ border:1px solid #e4e6ec;border-radius:12px;padding:0;overflow:hidden; }
  .dcard .dh{ padding:10px 14px;font-weight:800;font-size:14px;color:#fff; }
  .dcard.ok .dh{ background:#1f9d57; } .dcard.cond .dh{ background:#e08600; } .dcard.no .dh{ background:var(--red); }
  .dcard ul{ margin:0;padding:10px 14px 12px;list-style:none; }
  .dcard li{ font-size:13px;color:#3a4256;padding:5px 0;border-bottom:1px solid #f0f1f5;line-height:1.45; }
  .dcard li:last-child{ border-bottom:none; }
  .dcard li b{ color:var(--navy); }
  .foot{ font-size:12px;color:#8a90a0;text-align:center;margin-top:16px;padding:0 16px; }
  .foot a{ color:var(--navy);font-weight:700;text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="flag"><i class="y"></i><i class="b"></i><i class="r"></i></div>
  <div class="head">
    <div class="dot">❤</div>
    <div>
      <h1 id="h1"></h1>
      <p id="sub"></p>
    </div>
    <button class="toggle" id="toggle" onclick="setLang(LANG==='en'?'es':'en')"></button>
  </div>

  <div class="alert" id="alert"></div>

  <div class="money" id="money"></div>

  <div class="flow" id="flow"></div>

  <div class="controls">
    <input id="q" type="text">
    <select id="city"></select>
  </div>

  <div class="grid">
    <div id="map"></div>
    <div class="list" id="list"></div>
  </div>
  <div class="empty" id="empty" style="display:none;"></div>

  <div class="donate">
    <h2 id="donateTitle"></h2>
    <p class="dsub" id="donateSub"></p>
    <div class="note" id="note"></div>
    <div class="dcols" id="dcols"></div>
  </div>

  <p class="foot" id="foot"></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gesture-handling/dist/leaflet-gesture-handling.min.js"></script>
<script>
const data = [
  {n:"El Sabor Katracho", a:"4267 S Orcas St", c:"Seattle, WA 98118", h:"Tue–Sun 12–9pm · Mon closed"},
  {n:"Mojito", a:"8511 Roosevelt Way NE", c:"Seattle, WA 98115", h:"Mon–Fri 11am–2pm & eve · Sat 10am–10pm · Sun 10am–9pm"},

  {n:"Waca Maya", a:"10410 Holman Rd N", c:"Seattle, WA 98133", h:"≈Daily 11am–8:30pm (Sun from 12:30pm)"},
  {n:"Fogo de Chão", a:"18602 Alderwood Mall Pkwy, Ste 1110", c:"Lynnwood, WA 98037", h:"Mon–Thu 11:30am–9:30pm · Fri 11:30am–10pm · Sat 11am–10pm · Sun 11am–9pm"},

  {n:"Birriería Tijuana (Lakewood)", a:"8302 S Tacoma Way", c:"Lakewood, WA 98499", h:"Daily 9am–9pm"},
  {n:"Birriería Tijuana (Federal Way)", a:"1636 S 312th St", c:"Federal Way, WA 98003", h:"Daily 9am–9pm"},
  {n:"Welcome Restaurant and Bar", a:"5105 N Pearl St", c:"Ruston, WA 98407"},
  {n:"Warehouse", a:"801 SW 16th St", c:"Renton, WA 98057", wh:true}
];
data.forEach(d=>{ d.full=d.a+", "+d.c; d.cityName=d.c.split(",")[0]; });

const T = {
  en:{
    toggle:"Español", lang:"en",
    h1:"Venezuela Needs Us — Donation Drop-off Centers (WA)",
    sub:"Check the map to see which one is closer to you, then tap “Directions” to open the route in Google Maps.",
    search:"Search by name or city…",
    allCities:"All cities",
    directions:"Directions",
    alert:"⚠️ We have enough clothing — please do NOT bring more clothes. The urgent need right now is MEDICAL SUPPLIES.",
    money:"💵 Monetary donations are accepted ONLY through Victoria Venezuela Foundation. The collection centers accept physical goods only.", moneyBtn:"Donate online",
    whName:"Central warehouse — Renton", whTag:"From here ships to GEM (Doral, FL)",
    flow:'<b>How it works:</b> donations collected at the centers are consolidated at our central warehouse in Renton, then shipped to <a href="https://www.globalempowermentmission.org/" target="_blank">Global Empowerment Mission</a> (1850 NW 84th Ave #100, Doral, FL 33126) for international distribution.<span class="chain">Collection centers (WA) → Renton warehouse → GEM, Doral FL → International distribution</span><span class="onlynote">⚠️ The central warehouse only receives shipments from the collection centers — please do not drop off donations here. Bring your items to any collection center above.</span>',
    noResults:"No results.",
    donateTitle:"What to donate",
    donateSub:"Official immediate-needs list requested by Global Empowerment Mission (GEM):",
    note:"📦 <b>Please bring everything in boxes.</b> We accept donations that are <b>new, clean, sealed, in-date, and sorted by category</b>. Medicine, chemicals, batteries/power banks, and medical supplies are accepted <b>only if requested and approved by the receiving organization</b>.",
    foot:'Addresses verified · Donate online via <a href="https://www.EmbraceVenezuela.com" target="_blank">Victoria Venezuela Foundation</a>',
    cats:[
      {h:"🥫 Non-perishable food", items:["Canned protein (chicken, beef, tuna, vienna sausages, sardines)","Canned goods (beans, vegetables, fruits)","Dried fruits &amp; vegetables","Snacks (protein bars, crackers, chips, beef jerky)","Ramen","Meals ready to eat (MREs)"]},
      {h:"🏠 Household &amp; shelter", items:["Shelter: tents, cots, air mattresses, suitcases, backpacks (new)","Sleeping: sleeping bags, blankets, pillows (new)","Emergency: first-aid kits, LifeStraw filters, solar lanterns, power banks, radios, flashlights, batteries","Cleanup &amp; repair: tarps, duct tape, industrial trash bags, shovels, rakes, work boots","Protective gear: KN95 masks, hazmat suits, work gloves, hand &amp; foot warmers"]},
      {h:"👶 Baby &amp; children", items:["Diapers","Wipes","New bottles","Children's hygiene products","New clothes"]},
      {h:"🧼 Hygiene", items:["Toothbrushes / toothpaste","Deodorant","Feminine hygiene products","Toilet paper","Wet wipes"]},
      {h:"🐾 Pets", items:["Pet food (canned dog &amp; cat food, treats)","Pet supplies (bowls, leashes, crates, heavy-duty pads)","Pet care (chew toys, brushes, shampoo &amp; conditioner)"]}
    ],
    notAcceptedTitle:"❌ Not accepted",
    notAccepted:["Open or expired medicine; no box, lot or expiry date","Homemade or expired food","Used underwear; broken shoes","Glass containers, aerosols, perfumes, strong chemicals","Unsorted or mixed boxes"]
  },
  es:{
    toggle:"English", lang:"es",
    h1:"Venezuela nos necesita — Centros de acopio (WA)",
    sub:"Revisa el mapa para ver cuál te queda más cerca y toca “Cómo llegar” para abrir la ruta en Google Maps.",
    search:"Buscar por nombre o ciudad…",
    allCities:"Todas las ciudades",
    directions:"Cómo llegar",
    alert:"⚠️ Ya tenemos suficiente ropa — por favor NO traigan más ropa. La urgencia ahora son los INSUMOS MÉDICOS.",
    money:"💵 Las donaciones de dinero se reciben ÚNICAMENTE a través de Victoria Venezuela Foundation. Los centros de acopio reciben solo artículos físicos.", moneyBtn:"Dona en línea",
    whName:"Almacén central — Renton", whTag:"Desde aquí sale a GEM (Doral, FL)",
    flow:'<b>Cómo funciona:</b> las donaciones recogidas en los centros se consolidan en nuestro almacén central en Renton y luego se envían a <a href="https://www.globalempowermentmission.org/" target="_blank">Global Empowerment Mission</a> (1850 NW 84th Ave #100, Doral, FL 33126) para su distribución internacional.<span class="chain">Centros de acopio (WA) → Almacén Renton → GEM, Doral FL → Distribución internacional</span><span class="onlynote">⚠️ El almacén central solo recibe lo que llega desde los centros de acopio — por favor no lleves donaciones aquí. Entrégalas en cualquiera de los centros de acopio.</span>',
    noResults:"Sin resultados.",
    donateTitle:"Qué donar",
    donateSub:"Lista oficial de necesidades inmediatas solicitada por Global Empowerment Mission (GEM):",
    note:"📦 <b>Por favor trae todo en cajas.</b> Recibimos donaciones <b>nuevas, limpias, selladas, vigentes y clasificadas por categoría</b>. Medicamentos, químicos, baterías/power banks y artículos médicos se aceptan <b>solo si han sido solicitados y aprobados por la organización receptora</b>.",
    foot:'Direcciones verificadas · Dona en línea con <a href="https://www.EmbraceVenezuela.com" target="_blank">Victoria Venezuela Foundation</a>',
    cats:[
      {h:"🥫 Alimentos no perecederos", items:["Proteína enlatada (pollo, carne, atún, salchichas viena, sardinas)","Enlatados (frijoles, vegetales, frutas)","Frutas y vegetales deshidratados","Snacks (barras de proteína, galletas, papas, beef jerky)","Ramen","Comidas listas para comer (MRE)"]},
      {h:"🏠 Hogar y refugio", items:["Refugio: carpas, catres, colchones inflables, maletas, mochilas (nuevos)","Descanso: sacos de dormir, cobijas, almohadas (nuevos)","Emergencia: botiquines, filtros LifeStraw, lámparas solares, power banks, radios, linternas, baterías","Limpieza y reparación: lonas, cinta adhesiva, bolsas de basura industriales, palas, rastrillos, botas de trabajo","Protección: mascarillas KN95, trajes hazmat, guantes de trabajo, calentadores de manos y pies"]},
      {h:"👶 Bebés y niños", items:["Pañales","Toallitas húmedas","Biberones nuevos","Productos de higiene infantil","Ropa nueva"]},
      {h:"🧼 Higiene", items:["Cepillos y pasta dental","Desodorante","Productos de higiene femenina","Papel higiénico","Toallitas húmedas"]},
      {h:"🐾 Mascotas", items:["Comida (enlatada para perro y gato, premios)","Artículos (platos, correas, jaulas, pads de alta absorción)","Cuidado (juguetes, cepillos, shampoo y acondicionador)"]}
    ],
    notAcceptedTitle:"❌ No aceptado",
    notAccepted:["Medicamentos abiertos o vencidos; sin caja, lote ni fecha","Comida casera o vencida","Ropa interior usada; zapatos rotos","Envases de vidrio, aerosoles, perfumes, químicos fuertes","Cajas sin clasificar o mixtas"]
  }
};

let LANG = "en";
const dir = d => "https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(d.n+", "+d.full);

const map = L.map('map', {gestureHandling:true}).setView([47.55,-122.25], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);

const navyIcon = L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-24],
  html:'<svg width="26" height="26" viewBox="0 0 26 26"><path d="M13 0C7 0 3 4 3 10c0 7 10 16 10 16s10-9 10-16C23 4 19 0 13 0z" fill="#cf1b2b" stroke="#11214a" stroke-width="1.5"/><circle cx="13" cy="10" r="4" fill="#f4c40b"/></svg>'});

const whIcon = L.divIcon({className:'',iconSize:[38,38],iconAnchor:[19,36],popupAnchor:[0,-34],
  html:'<svg width="38" height="38" viewBox="0 0 38 38"><path d="M19 0C10 0 5 6 5 13c0 10 14 24 14 24s14-14 14-24C33 6 28 0 19 0z" fill="#f4c40b" stroke="#11214a" stroke-width="2.5"/><path d="M11 16l8-5 8 5v8H11z" fill="#11214a"/><rect x="16.5" y="18" width="5" height="6" fill="#f4c40b"/></svg>'});

const displayName = d => d.wh ? T[LANG].whName : d.n;

const listEl=document.getElementById('list'), q=document.getElementById('q'),
      city=document.getElementById('city'), empty=document.getElementById('empty');

function buildCities(){
  const t=T[LANG];
  city.innerHTML='<option value="">'+t.allCities+'</option>';
  [...new Set(data.map(d=>d.cityName))].sort().forEach(cn=>{
    const o=document.createElement('option');o.value=cn;o.textContent=cn;city.appendChild(o);
  });
}

function fillList(id,arr){
  document.getElementById(id).innerHTML = arr.map(x=>'<li>'+x+'</li>').join('');
}

function setLang(l){
  LANG=l; const t=T[l];
  document.documentElement.lang=l;
  document.getElementById('toggle').textContent=t.toggle;
  document.getElementById('h1').textContent=t.h1;
  document.getElementById('sub').textContent=t.sub;
  document.getElementById('alert').textContent=t.alert;
  document.getElementById('money').innerHTML='<span class="mtxt">'+t.money+'</span><a href="https://www.EmbraceVenezuela.com" target="_blank">'+t.moneyBtn+'</a>';
  document.getElementById('flow').innerHTML=t.flow;
  q.placeholder=t.search;
  empty.textContent=t.noResults;
  document.getElementById('donateTitle').textContent=t.donateTitle;
  document.getElementById('donateSub').textContent=t.donateSub;
  document.getElementById('note').innerHTML=t.note;
  document.getElementById('foot').innerHTML=t.foot;
  let cards=t.cats.map(c=>'<div class="dcard ok"><div class="dh">'+c.h+'</div><ul>'+c.items.map(i=>'<li>'+i+'</li>').join('')+'</ul></div>').join('');
  cards+='<div class="dcard no"><div class="dh">'+t.notAcceptedTitle+'</div><ul>'+t.notAccepted.map(i=>'<li>'+i+'</li>').join('')+'</ul></div>';
  document.getElementById('dcols').innerHTML=cards;
  buildCities();
  data.forEach(d=>{ if(d.marker) d.marker.setPopupContent(popHtml(d)); });
  render();
}

function popHtml(d){
  const tag = d.wh ? ' 📦 '+T[LANG].whTag : '';
  const link = d.wh ? '' : '<br><a href="'+dir(d)+'" target="_blank">▶ '+T[LANG].directions+'</a>';
  return '<div class="pop"><b>'+displayName(d)+'</b>'+tag+'<br>'+d.full+link+'</div>';
}

async function geocode(d){
  try{
    const url="https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=us&q="+encodeURIComponent(d.full);
    const r=await fetch(url); const j=await r.json();
    if(j[0]){ d.lat=+j[0].lat; d.lon=+j[0].lon; }
  }catch(e){}
}

async function init(){
  for(const d of data){ await geocode(d); await new Promise(r=>setTimeout(r,900)); placeMarker(d); }
  const pts=data.filter(d=>d.lat).map(d=>[d.lat,d.lon]);
  if(pts.length) map.fitBounds(pts,{padding:[30,30]});
}

function placeMarker(d){
  if(!d.lat) return;
  d.marker=L.marker([d.lat,d.lon],{icon:d.wh?whIcon:navyIcon,zIndexOffset:d.wh?1000:0}).addTo(map).bindPopup(popHtml(d));
}

function makeCard(d,t){
  const card=document.createElement('div'); card.className='card'+(d.wh?' wh':'');
  const nameHtml = d.wh ? displayName(d)+' <span class="badge">📦 '+t.whTag+'</span>' : d.n;
  const btn = d.wh ? '' : '<a class="btn" href="'+dir(d)+'" target="_blank" onclick="event.stopPropagation()">▶ '+t.directions+'</a>';
  const hours = d.h ? '<p class="hours">🕒 '+d.h+'</p>' : '';
  card.innerHTML='<div class="info"><p class="name">'+nameHtml+'</p><p class="addr">📍 '+d.full+'</p>'+hours+'</div>'+btn;
  card.onclick=()=>{ if(d.marker){ map.setView([d.lat,d.lon],14); d.marker.openPopup(); document.getElementById('map').scrollIntoView({behavior:'smooth',block:'center'}); } };
  return card;
}

function render(){
  const term=q.value.trim().toLowerCase(), cf=city.value, t=T[LANG];
  listEl.innerHTML=''; let shown=0;
  const wh=data.find(d=>d.wh);
  if(wh){ listEl.appendChild(makeCard(wh,t)); }
  data.forEach(d=>{
    if(d.wh) return;
    if(cf && d.cityName!==cf) return;
    if(term && !(d.n.toLowerCase().includes(term)||d.full.toLowerCase().includes(term))) return;
    shown++;
    listEl.appendChild(makeCard(d,t));
  });
  empty.style.display=shown?'none':'block';
}
q.oninput=render; city.onchange=render;
setLang('en'); init();
</script>
</body>
</html>
